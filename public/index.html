<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your AI Partner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0a0a0f;--surface:#13131a;--border:#1e1e2e;
    --accent:#7c6fff;--accent-dim:#3d3680;
    --text:#e8e8f0;--text-muted:#6b6b8a;
    --user-bg:#1a1a2e;--ai-bg:#111118;
    --green:#4fffb0;--red:#ff4f6e;--sw:260px;
  }
  body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;height:100dvh;display:flex;overflow:hidden}

  /* SIDEBAR */
  #sidebar{width:var(--sw);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:transform .25s;z-index:10}
  #sidebar.hidden{transform:translateX(calc(-1 * var(--sw)));position:absolute;height:100%}
  .sb-head{padding:14px;border-bottom:1px solid var(--border)}
  .sb-label{font-family:'Space Mono',monospace;font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
  .btn-new{width:100%;background:var(--accent);border:none;color:white;padding:9px;border-radius:8px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s}
  .btn-new:hover{opacity:.85}
  #conv-list{flex:1;overflow-y:auto;padding:8px}
  #conv-list::-webkit-scrollbar{width:3px}
  #conv-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  .conv-item{padding:10px 12px;border-radius:8px;cursor:pointer;margin-bottom:4px;border:1px solid transparent;transition:all .15s;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .conv-item:hover{background:var(--bg);border-color:var(--border)}
  .conv-item.active{background:var(--user-bg);border-color:var(--accent-dim)}
  .conv-title{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .conv-meta{display:flex;align-items:center;gap:4px;flex-shrink:0}
  .conv-date{font-size:10px;color:var(--text-muted);font-family:'Space Mono',monospace}
  .conv-del{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;opacity:0;transition:opacity .15s;padding:2px 4px}
  .conv-item:hover .conv-del{opacity:1}
  .conv-del:hover{color:var(--red)}
  .sb-foot{padding:12px 14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
  .btn-outline{width:100%;background:transparent;border:1px solid var(--border);color:var(--text-muted);padding:8px;border-radius:8px;font-family:'Space Grotesk',sans-serif;font-size:12px;cursor:pointer;transition:all .15s;text-align:left}
  .btn-outline:hover{border-color:var(--accent);color:var(--accent)}

  /* MAIN */
  #main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
  header{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
  .btn-icon{background:none;border:1px solid var(--border);color:var(--text-muted);width:32px;height:32px;border-radius:7px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
  .btn-icon:hover{border-color:var(--accent);color:var(--accent)}
  .pulse-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
  .h-title{font-family:'Space Mono',monospace;font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .h-title span{color:var(--accent)}
  .btn-call{background:none;border:1px solid var(--border);color:var(--text-muted);padding:5px 12px;border-radius:7px;cursor:pointer;font-size:12px;font-family:'Space Grotesk',sans-serif;transition:all .15s;flex-shrink:0}
  .btn-call:hover{border-color:var(--green);color:var(--green)}
  .btn-call.active{background:var(--red);border-color:var(--red);color:white}

  /* MEMORY PANEL */
  #mem-panel{display:none;background:var(--surface);border-bottom:1px solid var(--border);padding:14px;flex-shrink:0}
  #mem-panel.open{display:block}
  .mem-label{font-family:'Space Mono',monospace;font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
  #mem-text{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:13px;padding:10px 12px;border-radius:8px;resize:vertical;min-height:80px;outline:none}
  #mem-text:focus{border-color:var(--accent)}
  .mem-actions{display:flex;gap:8px;margin-top:8px;align-items:center}
  .btn-save{background:var(--accent);border:none;color:white;padding:6px 16px;border-radius:6px;font-family:'Space Grotesk',sans-serif;font-size:12px;cursor:pointer;font-weight:600;transition:opacity .15s}
  .btn-save:hover{opacity:.85}
  .st{font-size:11px;font-family:'Space Mono',monospace;color:var(--text-muted)}
  .st.ok{color:var(--green)} .st.err{color:var(--red)}

  /* CALL MODE */
  #call-mode{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:24px;padding:40px}
  #call-mode.active{display:flex}
  .call-orb{width:120px;height:120px;border-radius:50%;background:var(--accent-dim);border:3px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:40px;transition:all .3s;cursor:pointer}
  .call-orb.listening{background:#1a2e1a;border-color:var(--green);animation:orb-pulse 1.5s infinite}
  .call-orb.speaking{background:#2e1a1a;border-color:var(--red);animation:orb-pulse 0.8s infinite}
  @keyframes orb-pulse{0%,100%{box-shadow:0 0 0 0 rgba(127,111,255,.4)}50%{box-shadow:0 0 0 20px rgba(127,111,255,0)}}
  .call-status{font-family:'Space Mono',monospace;font-size:13px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em}
  .call-transcript{max-width:500px;width:100%;text-align:center;font-size:14px;line-height:1.6;color:var(--text);min-height:60px}
  .btn-end-call{background:var(--red);border:none;color:white;padding:10px 24px;border-radius:8px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s}
  .btn-end-call:hover{opacity:.85}

  /* CHAT */
  #chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
  #chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
  #chat::-webkit-scrollbar{width:4px}
  #chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
  .msg{display:flex;gap:10px;max-width:800px;width:100%}
  .msg.user{align-self:flex-end;flex-direction:row-reverse}
  .msg.ai{align-self:flex-start}
  .avatar{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;flex-shrink:0;margin-top:2px}
  .msg.user .avatar{background:var(--accent-dim);color:var(--accent)}
  .msg.ai .avatar{background:#1a2a1a;color:var(--green)}
  .bubble{padding:11px 15px;border-radius:12px;font-size:14px;line-height:1.65;max-width:calc(100% - 44px)}
  .msg.user .bubble{background:var(--user-bg);border:1px solid var(--accent-dim);border-top-right-radius:3px}
  .msg.ai .bubble{background:var(--ai-bg);border:1px solid var(--border);border-top-left-radius:3px}
  .bubble p+p{margin-top:8px}
  .file-chip{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--text-muted);margin:4px 4px 0 0}
  .file-chip .fi{font-size:14px}
  .typing{display:flex;gap:4px;align-items:center;padding:12px 15px}
  .typing span{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:blink 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}
  .empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:10px;color:var(--text-muted);padding:40px 20px}
  .empty-icon{font-size:32px;margin-bottom:4px}
  .empty-state h2{font-size:17px;color:var(--text);font-weight:500}
  .empty-state p{font-size:13px;max-width:280px;line-height:1.6}

  /* INPUT */
  #input-area{border-top:1px solid var(--border);padding:12px 14px;background:var(--surface);flex-shrink:0}
  .input-row{display:flex;gap:8px;align-items:flex-end}
  .btn-attach{background:none;border:1px solid var(--border);color:var(--text-muted);width:40px;height:40px;border-radius:9px;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
  .btn-attach:hover{border-color:var(--accent);color:var(--accent)}
  #file-input{display:none}
  #user-input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:14px;padding:10px 13px;border-radius:10px;outline:none;resize:none;min-height:40px;max-height:130px;line-height:1.5;transition:border-color .15s}
  #user-input:focus{border-color:var(--accent)}
  #user-input::placeholder{color:var(--text-muted)}
  #send-btn{background:var(--accent);border:none;color:white;width:40px;height:40px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s,transform .1s}
  #send-btn:hover{opacity:.85}#send-btn:active{transform:scale(.95)}#send-btn:disabled{opacity:.4;cursor:not-allowed}
  #send-btn svg{width:16px;height:16px}
  #file-preview{display:flex;flex-wrap:wrap;gap:6px;padding:6px 0 0;min-height:0}
  .fp-chip{display:inline-flex;align-items:center;gap:6px;background:var(--user-bg);border:1px solid var(--accent-dim);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--text)}
  .fp-remove{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:0;line-height:1}
  .fp-remove:hover{color:var(--red)}
  .hint{font-size:11px;color:var(--text-muted);margin-top:5px;font-family:'Space Mono',monospace}

  @media(max-width:600px){
    #sidebar{position:absolute;height:100%}
    #sidebar.hidden{transform:translateX(-100%)}
  }
</style>
</head>
<body>

<div id="sidebar">
  <div class="sb-head">
    <div class="sb-label">Conversations</div>
    <button class="btn-new" onclick="newConversation()">+ New Chat</button>
  </div>
  <div id="conv-list"></div>
  <div class="sb-foot">
    <button class="btn-outline" onclick="toggleMemory()">âš™ Memory</button>
  </div>
</div>

<div id="main">
  <header>
    <button class="btn-icon" onclick="toggleSidebar()">â˜°</button>
    <div class="pulse-dot"></div>
    <div class="h-title">YOUR AI PARTNER â€” <span>CLARENCE</span></div>
    <button class="btn-call" id="call-btn" onclick="toggleCallMode()">ðŸ“ž Call</button>
  </header>

  <div id="mem-panel">
    <div class="mem-label">Persistent Memory â€” auto-updated & synced across devices</div>
    <textarea id="mem-text" placeholder="What your AI always knows about you. Updates automatically after conversations."></textarea>
    <div class="mem-actions">
      <button class="btn-save" onclick="saveMemory()">Save & sync</button>
      <span id="mem-st" class="st"></span>
    </div>
  </div>

  <!-- CALL MODE -->
  <div id="call-mode">
    <div class="call-orb" id="call-orb" onclick="callOrbClick()">ðŸŽ™</div>
    <div class="call-status" id="call-status">Tap to speak</div>
    <div class="call-transcript" id="call-transcript"></div>
    <button class="btn-end-call" onclick="toggleCallMode()">End Call</button>
  </div>

  <!-- CHAT -->
  <div id="chat-area">
    <div id="chat"></div>
    <div id="input-area">
      <div id="file-preview"></div>
      <div class="input-row">
        <button class="btn-attach" onclick="document.getElementById('file-input').click()" title="Attach files">ðŸ“Ž</button>
        <input type="file" id="file-input" multiple accept="*/*" onchange="handleFiles(this.files)">
        <textarea id="user-input" placeholder="Share an idea, attach files, ask anything..." rows="1"></textarea>
        <button id="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <div class="hint">Enter to send Â· Shift+Enter for newline Â· ðŸ“Ž to attach files Â· ðŸ“ž for voice call</div>
    </div>
  </div>
</div>

<script>
const MEMORY_ID = 'clarence_memory';
let currentConvId = null;
let conversationHistory = [];
let isLoading = false;
let attachedFiles = [];
let inCallMode = false;
let callRecognition = null;
let callListening = false;

const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const memText = document.getElementById('mem-text');
const memSt = document.getElementById('mem-st');
const callOrb = document.getElementById('call-orb');
const callStatus = document.getElementById('call-status');
const callTranscript = document.getElementById('call-transcript');

// â”€â”€ SIDEBAR â”€â”€
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('hidden');
}

// â”€â”€ MEMORY â”€â”€
async function loadMemory() {
  try {
    const res = await fetch(`/api/sync?id=${MEMORY_ID}`);
    const data = await res.json();
    return data.content || '';
  } catch {
    return localStorage.getItem('clarence_mem_bk') || '';
  }
}

async function saveMemory(silent = false) {
  if (!silent) { memSt.textContent = 'Syncing...'; memSt.className = 'st'; }
  localStorage.setItem('clarence_mem_bk', memText.value);
  try {
    const res = await fetch('/api/sync', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ id: MEMORY_ID, content: memText.value })
    });
    if (!res.ok) throw new Error();
    if (!silent) { memSt.textContent = 'Synced âœ“'; memSt.className = 'st ok'; setTimeout(() => { memSt.textContent = ''; }, 3000); }
  } catch {
    if (!silent) { memSt.textContent = 'Saved locally only'; memSt.className = 'st err'; }
  }
}

async function toggleMemory() {
  const panel = document.getElementById('mem-panel');
  if (!panel.classList.contains('open')) {
    panel.classList.add('open');
    memSt.textContent = 'Loading...';
    memText.value = await loadMemory();
    memSt.textContent = '';
  } else {
    panel.classList.remove('open');
  }
}

async function autoUpdateMemory() {
  if (conversationHistory.length < 2) return;
  try {
    const existing = await loadMemory();
    const res = await fetch('/api/extract-memory', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ messages: conversationHistory, existingMemory: existing })
    });
    const data = await res.json();
    if (data.extracted && data.extracted !== 'NOTHING_NEW') {
      const updated = existing ? existing + '\n\n' + data.extracted : data.extracted;
      memText.value = updated;
      await saveMemory(true);
    }
  } catch {}
}

// â”€â”€ CONVERSATIONS â”€â”€
function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function formatDate(iso) {
  const d = new Date(iso), now = new Date(), diff = now - d;
  if (diff < 86400000) return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  if (diff < 604800000) return d.toLocaleDateString([], {weekday:'short'});
  return d.toLocaleDateString([], {month:'short',day:'numeric'});
}

async function loadConvList() {
  try {
    const res = await fetch('/api/conversations');
    const list = await res.json();
    renderConvList(list);
  } catch {}
}

function renderConvList(list) {
  const el = document.getElementById('conv-list');
  if (!list || !list.length) {
    el.innerHTML = '<div style="padding:16px;font-size:12px;color:var(--text-muted);text-align:center">No conversations yet</div>';
    return;
  }
  el.innerHTML = list.map(c => `
    <div class="conv-item ${c.id === currentConvId ? 'active' : ''}" onclick="loadConversation('${c.id}')">
      <div class="conv-title">${c.title || 'New conversation'}</div>
      <div class="conv-meta">
        <div class="conv-date">${formatDate(c.updated_at)}</div>
        <button class="conv-del" onclick="deleteConv(event,'${c.id}')">âœ•</button>
      </div>
    </div>`).join('');
}

async function loadConversation(id) {
  try {
    const res = await fetch(`/api/conversations?id=${id}`);
    const data = await res.json();
    if (!data?.[0]) return;
    currentConvId = id;
    conversationHistory = JSON.parse(data[0].messages || '[]');
    renderChat();
    await loadConvList();
  } catch {}
}

function renderChat() {
  chatEl.innerHTML = '';
  if (!conversationHistory.length) { showEmpty(); return; }
  conversationHistory.forEach(msg => {
    if (msg.role === 'user') {
      const text = typeof msg.content === 'string' ? msg.content : msg.content.map(b => b.text || '').join('');
      addMsgDOM('user', text);
    } else if (msg.role === 'assistant') {
      const text = Array.isArray(msg.content)
        ? msg.content.filter(b => b.type === 'text').map(b => b.text).join('\n')
        : msg.content;
      if (text) addMsgDOM('ai', text);
    }
  });
  chatEl.scrollTop = chatEl.scrollHeight;
}

async function saveConv(firstMsg) {
  if (!currentConvId) currentConvId = generateId();
  const title = firstMsg.slice(0, 50) + (firstMsg.length > 50 ? '...' : '');
  try {
    await fetch('/api/conversations', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ id: currentConvId, title, messages: JSON.stringify(conversationHistory) })
    });
    loadConvList();
  } catch {}
}

async function deleteConv(e, id) {
  e.stopPropagation();
  if (!confirm('Delete this conversation?')) return;
  try {
    await fetch(`/api/conversations?id=${id}`, { method: 'DELETE' });
    if (id === currentConvId) newConversation();
    else loadConvList();
  } catch {}
}

function newConversation() {
  currentConvId = null;
  conversationHistory = [];
  attachedFiles = [];
  renderFilePreview();
  chatEl.innerHTML = '';
  showEmpty();
  loadConvList();
  inputEl.focus();
}

// â”€â”€ FILE HANDLING â”€â”€
const FILE_ICONS = { pdf:'ðŸ“„', jpg:'ðŸ–¼', jpeg:'ðŸ–¼', png:'ðŸ–¼', gif:'ðŸ–¼', webp:'ðŸ–¼', txt:'ðŸ“', md:'ðŸ“', epub:'ðŸ“š', doc:'ðŸ“', docx:'ðŸ“', csv:'ðŸ“Š', json:'ðŸ“‹', mp3:'ðŸŽµ', mp4:'ðŸŽ¬', default:'ðŸ“Ž' };

function getIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  return FILE_ICONS[ext] || FILE_ICONS.default;
}

async function handleFiles(files) {
  for (const file of files) {
    const reader = new FileReader();
    const result = await new Promise(resolve => {
      reader.onload = e => resolve(e.target.result);
      if (file.type.startsWith('image/')) reader.readAsDataURL(file);
      else reader.readAsDataURL(file);
    });
    attachedFiles.push({ name: file.name, type: file.type, data: result, size: file.size });
  }
  renderFilePreview();
  document.getElementById('file-input').value = '';
}

function renderFilePreview() {
  const el = document.getElementById('file-preview');
  el.innerHTML = attachedFiles.map((f, i) => `
    <div class="fp-chip">
      <span>${getIcon(f.name)}</span>
      <span>${f.name}</span>
      <button class="fp-remove" onclick="removeFile(${i})">âœ•</button>
    </div>`).join('');
}

function removeFile(i) {
  attachedFiles.splice(i, 1);
  renderFilePreview();
}

function buildFileContent(file) {
  if (file.type.startsWith('image/')) {
    return { type: 'image', source: { type: 'base64', media_type: file.type, data: file.data.split(',')[1] } };
  }
  if (file.type === 'application/pdf') {
    return { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: file.data.split(',')[1] } };
  }
  // For other files, send as text description
  return { type: 'text', text: `[Attached file: ${file.name} (${file.type}, ${Math.round(file.size/1024)}KB) â€” file content not directly readable in this format]` };
}

// â”€â”€ CHAT UI â”€â”€
function showEmpty() {
  chatEl.innerHTML = `<div class="empty-state"><div class="empty-icon">âš¡</div><h2>What's on your mind, Clarence?</h2><p>Chat, attach files, or tap ðŸ“ž for a voice call.</p></div>`;
}

function removeEmpty() { const e = chatEl.querySelector('.empty-state'); if (e) e.remove(); }

function addMsgDOM(role, content, files = []) {
  removeEmpty();
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;
  const av = document.createElement('div');
  av.className = 'avatar'; av.textContent = role === 'user' ? 'C' : 'AI';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (files.length) {
    bubble.innerHTML = files.map(f => `<div class="file-chip"><span class="fi">${getIcon(f.name)}</span>${f.name}</div>`).join('') + '<br>';
  }
  bubble.innerHTML += formatText(content);
  msg.appendChild(av); msg.appendChild(bubble);
  chatEl.appendChild(msg);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function formatText(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>').replace(/^/,'<p>').replace(/$/,'</p>');
}

function addTyping() {
  removeEmpty();
  const msg = document.createElement('div'); msg.className = 'msg ai'; msg.id = 'typing';
  const av = document.createElement('div'); av.className = 'avatar'; av.textContent = 'AI';
  const bubble = document.createElement('div'); bubble.className = 'bubble typing';
  bubble.innerHTML = '<span></span><span></span><span></span>';
  msg.appendChild(av); msg.appendChild(bubble); chatEl.appendChild(msg);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

function getDate() {
  return new Date().toLocaleDateString('en-US', {weekday:'long',year:'numeric',month:'long',day:'numeric'});
}

async function buildSystem() {
  const mem = await loadMemory();
  return `You are Clarence's personal AI thinking partner. Serve his best interests and help bring his ideas to life.

TODAY'S DATE: ${getDate()}

Core principles:
1. Always act in Clarence's best interest
2. Ask clarifying questions before drawing conclusions â€” never assume
3. Help develop ideas fully â€” push further, spot gaps, explore angles
4. Be direct and honest â€” flag problems clearly
5. Be a real thinking partner â€” challenge, explore, brainstorm
6. Use web search for current or real-world information
7. When you search, summarize findings and cite sources
8. You can read images, PDFs, and documents the user attaches

${mem ? `CLARENCE'S MEMORY:\n${mem}` : ''}

Style: conversational, direct, no fluff. One focused question at a time. Never lecture.`;
}

// â”€â”€ SEND â”€â”€
async function sendMessage(overrideText = null) {
  const text = overrideText || inputEl.value.trim();
  if (!text && !attachedFiles.length || isLoading) return;

  if (!overrideText) { inputEl.value = ''; inputEl.style.height = 'auto'; }
  isLoading = true; sendBtn.disabled = true;

  const files = [...attachedFiles];
  attachedFiles = [];
  renderFilePreview();

  const displayText = text || '(files attached)';
  addMsgDOM('user', displayText, files);

  // Build message content
  let userContent = [];
  files.forEach(f => userContent.push(buildFileContent(f)));
  if (text) userContent.push({ type: 'text', text });
  if (userContent.length === 1 && userContent[0].type === 'text') userContent = text;

  conversationHistory.push({ role: 'user', content: userContent });
  addTyping();

  try {
    const system = await buildSystem();
    const response = await fetch('/api/chat', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system,
        messages: conversationHistory,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }]
      })
    });
    const data = await response.json();
    removeTyping();

    if (data.content?.length) {
      const textBlocks = data.content.filter(b => b.type === 'text');
      const reply = textBlocks.map(b => b.text).join('\n');
      if (reply) {
        addMsgDOM('ai', reply);
        conversationHistory.push({ role: 'assistant', content: data.content });
        await saveConv(displayText);
        // Auto update memory silently every 4 AI turns
        if (conversationHistory.filter(m => m.role === 'assistant').length % 4 === 0) {
          autoUpdateMemory();
        }
      } else { addMsgDOM('ai', 'Something went wrong. Try again.'); }
    } else { addMsgDOM('ai', 'Something went wrong. Try again.'); }
  } catch {
    removeTyping();
    addMsgDOM('ai', 'Connection error. Try again.');
  }

  isLoading = false; sendBtn.disabled = false; inputEl.focus();
}

// â”€â”€ CALL MODE â”€â”€
async function toggleCallMode() {
  inCallMode = !inCallMode;
  document.getElementById('call-mode').classList.toggle('active', inCallMode);
  document.getElementById('chat-area').style.display = inCallMode ? 'none' : 'flex';
  const btn = document.getElementById('call-btn');
  btn.textContent = inCallMode ? 'âœ• End Call' : 'ðŸ“ž Call';
  btn.classList.toggle('active', inCallMode);

  if (!inCallMode) {
    stopCall();
  } else {
    callTranscript.textContent = '';
    callStatus.textContent = 'Tap the mic to speak';
  }
}

function callOrbClick() {
  if (callListening) {
    stopListening();
  } else {
    startListening();
  }
}

function startListening() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    callTranscript.textContent = 'Voice not supported in this browser. Use Chrome.';
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  callRecognition = new SR();
  callRecognition.continuous = false;
  callRecognition.interimResults = true;
  callRecognition.lang = 'en-US';

  callRecognition.onstart = () => {
    callListening = true;
    callOrb.className = 'call-orb listening';
    callOrb.textContent = 'ðŸŽ™';
    callStatus.textContent = 'Listening...';
  };

  callRecognition.onresult = (e) => {
    const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
    callTranscript.textContent = transcript;
  };

  callRecognition.onend = async () => {
    callListening = false;
    const said = callTranscript.textContent.trim();
    if (said) {
      callOrb.className = 'call-orb speaking';
      callOrb.textContent = 'ðŸ’¬';
      callStatus.textContent = 'Thinking...';
      await handleCallMessage(said);
    } else {
      callOrb.className = 'call-orb';
      callOrb.textContent = 'ðŸŽ™';
      callStatus.textContent = 'Tap to speak';
    }
  };

  callRecognition.onerror = () => {
    callListening = false;
    callOrb.className = 'call-orb';
    callOrb.textContent = 'ðŸŽ™';
    callStatus.textContent = 'Error. Tap to try again.';
  };

  callRecognition.start();
}

function stopListening() {
  if (callRecognition) callRecognition.stop();
}

function stopCall() {
  if (callRecognition) { try { callRecognition.stop(); } catch {} }
  callListening = false;
}

async function handleCallMessage(text) {
  conversationHistory.push({ role: 'user', content: text });
  callStatus.textContent = 'Thinking...';

  try {
    const system = await buildSystem();
    const response = await fetch('/api/chat', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 300,
        system: system + '\n\nIMPORTANT: You are in voice call mode. Keep responses SHORT (2-3 sentences max). Speak naturally, no markdown.',
        messages: conversationHistory
      })
    });
    const data = await response.json();
    const textBlocks = data.content?.filter(b => b.type === 'text') || [];
    const reply = textBlocks.map(b => b.text).join(' ');

    if (reply) {
      conversationHistory.push({ role: 'assistant', content: data.content });
      callTranscript.textContent = reply;
      callStatus.textContent = 'Speaking...';
      await speakText(reply);
      callOrb.className = 'call-orb';
      callOrb.textContent = 'ðŸŽ™';
      callStatus.textContent = 'Tap to speak';
      await saveConv('(voice call)');
    }
  } catch {
    callStatus.textContent = 'Error. Tap to try again.';
    callOrb.className = 'call-orb';
    callOrb.textContent = 'ðŸŽ™';
  }
}

async function speakText(text) {
  // Try OpenAI TTS first, fall back to browser TTS
  try {
    const res = await fetch('/api/tts', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ text })
    });
    if (res.ok) {
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      await new Promise(resolve => { audio.onended = resolve; audio.onerror = resolve; audio.play(); });
      URL.revokeObjectURL(url);
      return;
    }
  } catch {}

  // Browser TTS fallback
  return new Promise(resolve => {
    const utt = new SpeechSynthesisUtterance(text);
    utt.rate = 1; utt.pitch = 1;
    utt.onend = resolve; utt.onerror = resolve;
    speechSynthesis.speak(utt);
  });
}

  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 130) + 'px';
});
inputEl.addEventListener('keydown', function(e) {

});
