<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your AI Partner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --accent: #7c6fff;
    --accent-dim: #3d3680;
    --text: #e8e8f0;
    --text-muted: #6b6b8a;
    --user-bg: #1a1a2e;
    --ai-bg: #111118;
    --green: #4fffb0;
    --red: #ff4f6e;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .header-left { display: flex; align-items: center; gap: 10px; }

  .pulse-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .title {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .title span { color: var(--accent); }

  .header-actions { display: flex; gap: 8px; }

  .btn-sm {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 5px 12px;
    border-radius: 6px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm.danger:hover { border-color: var(--red); color: var(--red); }

  #memory-panel {
    display: none;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    flex-shrink: 0;
  }

  #memory-panel.open { display: block; }

  .memory-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  #memory-text {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    padding: 10px 12px;
    border-radius: 8px;
    resize: vertical;
    min-height: 80px;
    outline: none;
  }

  #memory-text:focus { border-color: var(--accent); }

  .memory-actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    align-items: center;
  }

  .btn-save {
    background: var(--accent);
    border: none;
    color: white;
    padding: 6px 16px;
    border-radius: 6px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    cursor: pointer;
    font-weight: 600;
    transition: opacity 0.15s;
  }

  .btn-save:hover { opacity: 0.85; }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    display: flex;
    gap: 12px;
    max-width: 820px;
    width: 100%;
  }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.ai { align-self: flex-start; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg.user .avatar { background: var(--accent-dim); color: var(--accent); }
  .msg.ai .avatar { background: #1a2a1a; color: var(--green); }

  .bubble {
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.65;
    max-width: calc(100% - 50px);
  }

  .msg.user .bubble {
    background: var(--user-bg);
    border: 1px solid var(--accent-dim);
    border-top-right-radius: 4px;
  }

  .msg.ai .bubble {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }

  .bubble p + p { margin-top: 8px; }

  .bubble img {
    max-width: 100%;
    border-radius: 8px;
    margin-top: 8px;
    display: block;
  }

  .typing {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 14px 16px;
  }

  .typing span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: blink 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 100% { opacity: 0.3; transform: translateY(0); }
    50% { opacity: 1; transform: translateY(-3px); }
  }

  #input-area {
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  #user-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    padding: 11px 14px;
    border-radius: 10px;
    outline: none;
    resize: none;
    min-height: 44px;
    max-height: 140px;
    line-height: 1.5;
    transition: border-color 0.15s;
  }

  #user-input:focus { border-color: var(--accent); }
  #user-input::placeholder { color: var(--text-muted); }

  #send-btn {
    background: var(--accent);
    border: none;
    color: white;
    width: 44px; height: 44px;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
  }

  #send-btn:hover { opacity: 0.85; }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #send-btn svg { width: 18px; height: 18px; }

  .hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
    font-family: 'Space Mono', monospace;
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 12px;
    color: var(--text-muted);
    padding: 40px 20px;
  }

  .empty-icon { font-size: 36px; margin-bottom: 4px; }

  .empty-state h2 {
    font-size: 18px;
    color: var(--text);
    font-weight: 500;
  }

  .empty-state p {
    font-size: 13px;
    max-width: 300px;
    line-height: 1.6;
  }

  .saved-indicator {
    font-size: 11px;
    color: var(--green);
    font-family: 'Space Mono', monospace;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .saved-indicator.show { opacity: 1; }

  .search-badge {
    display: inline-block;
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    color: var(--green);
    border: 1px solid var(--green);
    padding: 2px 6px;
    border-radius: 4px;
    margin-bottom: 6px;
    opacity: 0.7;
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="pulse-dot"></div>
    <div class="title">YOUR AI PARTNER â€” <span>CLARENCE</span></div>
  </div>
  <div class="header-actions">
    <button class="btn-sm" onclick="toggleMemory()">Memory</button>
    <button class="btn-sm danger" onclick="clearChat()">Clear chat</button>
  </div>
</header>

<div id="memory-panel">
  <div class="memory-label">Persistent Memory â€” what your AI always knows about you</div>
  <textarea id="memory-text" placeholder="Write anything you want your AI partner to always remember: your goals, current projects, background, what you're working toward..."></textarea>
  <div class="memory-actions">
    <button class="btn-save" onclick="saveMemory()">Save memory</button>
    <span class="saved-indicator" id="saved-indicator">Saved</span>
  </div>
</div>

<div id="chat"></div>

<div id="input-area">
  <div class="input-row">
    <textarea id="user-input" placeholder="Share an idea, ask anything, or say 'generate image of...'" rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <div class="hint">Enter to send Â· Shift+Enter for new line Â· "generate image of..." for images</div>
</div>

<script>
  const MEMORY_KEY = 'clarence_ai_memory';
  let conversationHistory = [];
  let isLoading = false;

  const chatEl = document.getElementById('chat');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const memoryText = document.getElementById('memory-text');

  function loadMemory() { return localStorage.getItem(MEMORY_KEY) || ''; }

  function saveMemory() {
    localStorage.setItem(MEMORY_KEY, memoryText.value);
    const indicator = document.getElementById('saved-indicator');
    indicator.classList.add('show');
    setTimeout(() => indicator.classList.remove('show'), 2000);
  }

  function toggleMemory() {
    const panel = document.getElementById('memory-panel');
    if (!panel.classList.contains('open')) memoryText.value = loadMemory();
    panel.classList.toggle('open');
  }

  function clearChat() {
    if (confirm('Clear this conversation? Memory will be kept.')) {
      conversationHistory = [];
      chatEl.innerHTML = '';
      showEmptyState();
    }
  }

  function showEmptyState() {
    chatEl.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">âš¡</div>
        <h2>What's on your mind, Clarence?</h2>
        <p>Share an idea, ask anything â€” or say "generate image of..." to create images.</p>
      </div>
    `;
  }

  function removeEmptyState() {
    const es = chatEl.querySelector('.empty-state');
    if (es) es.remove();
  }

  function getCurrentDate() {
    const now = new Date();
    return now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  }

  function addMessage(role, content, isImage = false) {
    removeEmptyState();
    const msg = document.createElement('div');
    msg.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'C' : 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (isImage) {
      const img = document.createElement('img');
      img.src = content;
      img.alt = 'Generated image';
      bubble.appendChild(img);
    } else {
      bubble.innerHTML = formatText(content);
    }

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatEl.appendChild(msg);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function formatText(text) {
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>')
      .replace(/^/, '<p>').replace(/$/, '</p>');
  }

  function addTyping(label = '') {
    removeEmptyState();
    const msg = document.createElement('div');
    msg.className = 'msg ai';
    msg.id = 'typing-indicator';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = `${label ? `<div class="search-badge">${label}</div>` : ''}<div class="typing"><span></span><span></span><span></span></div>`;

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatEl.appendChild(msg);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  function isImageRequest(text) {
    return /^(generate|create|make|draw|show me|give me)\s+(an?\s+)?image\s+of\b/i.test(text) ||
           /^(generate|create|make|draw)\s+/i.test(text) && text.toLowerCase().includes('image');
  }

  function buildSystemPrompt() {
    const memory = loadMemory();
    const today = getCurrentDate();
    return `You are Clarence's personal AI thinking partner. Your entire purpose is to serve his best interests and help bring his ideas to life.

TODAY'S DATE: ${today}. Always use this when answering anything time-sensitive. Never guess the date.

Core principles:
1. Always act in Clarence's best interest â€” not just what he wants to hear, but what genuinely helps him
2. Ask clarifying questions before drawing conclusions â€” never assume you know what he means
3. Help him develop his ideas fully â€” push them further, spot gaps, explore angles he hasn't considered
4. Be direct and honest â€” if an idea has problems, say so and explain why
5. Be a real thinking partner â€” challenge, explore, brainstorm, not just agree
6. You have access to web search â€” use it whenever current or real-world information would help Clarence
7. When you search the web, tell Clarence what you found and cite where it came from

${memory ? `CLARENCE'S PERSISTENT MEMORY (always keep this in mind):\n${memory}` : ''}

Style: conversational, direct, no fluff. Ask one focused question at a time. Never lecture. Be genuinely invested in his success.`;
  }

  async function generateImage(prompt) {
    addTyping('Generating image...');
    try {
      const response = await fetch('/api/image', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt })
      });
      const data = await response.json();
      removeTyping();
      if (data.data && data.data[0] && data.data[0].url) {
        addMessage('ai', data.data[0].url, true);
      } else {
        addMessage('ai', 'Image generation failed. Make sure your OpenAI API key is set in Vercel environment variables.');
      }
    } catch (err) {
      removeTyping();
      addMessage('ai', 'Image generation failed. Check your OpenAI API key in Vercel settings.');
    }
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    isLoading = true;
    sendBtn.disabled = true;

    addMessage('user', text);

    if (isImageRequest(text)) {
      await generateImage(text);
      isLoading = false;
      sendBtn.disabled = false;
      inputEl.focus();
      return;
    }

    conversationHistory.push({ role: 'user', content: text });
    addTyping('Thinking...');

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          system: buildSystemPrompt(),
          messages: conversationHistory,
          tools: [{
            type: "web_search_20250305",
            name: "web_search"
          }]
        })
      });

      const data = await response.json();
      removeTyping();

      if (data.content && data.content.length > 0) {
        const textBlocks = data.content.filter(b => b.type === 'text');
        const reply = textBlocks.map(b => b.text).join('\n');
        if (reply) {
          addMessage('ai', reply);
          conversationHistory.push({ role: 'assistant', content: data.content });
        } else {
          addMessage('ai', 'Something went wrong. Try again.');
        }
      } else {
        addMessage('ai', 'Something went wrong. Try again.');
      }
    } catch (err) {
      removeTyping();
      addMessage('ai', 'Connection error. Check your internet and try again.');
    }

    isLoading = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }

  inputEl.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 140) + 'px';
  });

  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  showEmptyState();
  inputEl.focus();
</script>
</body>
</html>
